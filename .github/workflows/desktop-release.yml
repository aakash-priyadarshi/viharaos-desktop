name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Desktop version (e.g. 0.2.1)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: macos-15
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-15
            target: x86_64-apple-darwin
            label: macos-x86_64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        shell: bash
        run: |
          cargo install tauri-cli --version "^2.0.0" --locked || true

      - name: Install GitHub CLI (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install gh -y || true
          echo "C:\\Program Files\\GitHub CLI" >> $GITHUB_PATH

      - name: Validate release version
        shell: bash
        run: |
          if ! echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version '${{ inputs.version }}' — must match ^[0-9]+\.[0-9]+\.[0-9]+$"
            exit 1
          fi

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd src-tauri
          cargo tauri build --target ${{ matrix.target }}

      - name: Generate changelog
        if: matrix.label == 'windows'
        id: changelog
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          TAG="desktop-v${VERSION}"
          git fetch --tags || true
          PREVIOUS_TAG=$(git tag --list 'desktop-v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous desktop release tag found. Including all commits."
            RANGE="HEAD"
          else
            echo "Generating changelog: ${PREVIOUS_TAG} → ${TAG}"
            RANGE="${PREVIOUS_TAG}..HEAD"
          fi

          # Collect commits grouped by conventional-commit type
          FEATURES=$(git log --pretty=format:'%s' "${RANGE}" 2>/dev/null | grep -iE '^(feat|feature)(\(|:)' | sed 's/^[^:]*: *//' | sed 's/^/- /' || true)
          FIXES=$(git log --pretty=format:'%s' "${RANGE}" 2>/dev/null | grep -iE '^fix(\(|:)' | sed 's/^[^:]*: *//' | sed 's/^/- /' || true)
          REFACTORS=$(git log --pretty=format:'%s' "${RANGE}" 2>/dev/null | grep -iE '^(refactor|perf)(\(|:)' | sed 's/^[^:]*: *//' | sed 's/^/- /' || true)
          CHORES=$(git log --pretty=format:'%s' "${RANGE}" 2>/dev/null | grep -iE '^(chore|ci|build|docs|style|test)(\(|:)' | sed 's/^[^:]*: *//' | sed 's/^/- /' || true)

          # Build the markdown changelog
          {
            echo "## What's New in ViharaOS Desktop v${VERSION}"
            echo ""
            if [ -n "$FIXES" ]; then
              echo "## Bug Fixes"
              echo ""
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$FEATURES" ]; then
              echo "## New Features"
              echo ""
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$REFACTORS" ]; then
              echo "## Improvements"
              echo ""
              echo "$REFACTORS"
              echo ""
            fi
            if [ -n "$CHORES" ]; then
              echo "## Maintenance"
              echo ""
              echo "$CHORES"
              echo ""
            fi

            # If no categorized commits, show a fallback
            if [ -z "$FEATURES" ] && [ -z "$FIXES" ] && [ -z "$REFACTORS" ] && [ -z "$CHORES" ]; then
              echo "No notable changes in this release."
              echo ""
            fi

            echo "---"
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG}"
            else
              echo "Initial desktop release."
            fi
          } > changelog.md

          echo "=== Generated changelog ==="
          cat changelog.md
          echo "=== End changelog ==="

      - name: Create tag and release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="desktop-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" || true
          git push origin "$TAG" || true
          gh release create "$TAG" \
            --title "ViharaOS Desktop v${VERSION}" \
            --notes-file changelog.md \
            --verify-tag || true

      - name: Setup WinApp CLI (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-WinAppCli@v0.1
        with:
          version: latest

      - name: Build Windows MSIX package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\scripts\build-msix.ps1 -Version "${{ inputs.version }}"

      - name: Upload Windows installers and updater artifacts
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="desktop-v${VERSION}"
          BUILD_DIR="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          find "$BUILD_DIR" -name "*.msi" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "*.msix" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "latest.json" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "*.sig" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "*-setup.exe" -exec gh release upload "$TAG" {} --clobber \;

      - name: Upload macOS installers and updater artifacts
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="desktop-v${VERSION}"
          BUILD_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          # Upload .dmg, .app.tar.gz, latest.json, and .sig files
          find "$BUILD_DIR" -name "*.dmg" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "*.app.tar.gz" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "latest.json" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "*.sig" -exec gh release upload "$TAG" {} --clobber \;

      - name: Verify release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="desktop-v${{ inputs.version }}"
          echo "Release assets for $TAG:"
          gh release view "$TAG" --json assets --jq '.assets[].name'

  store-publish:
    name: Publish MSIX to Microsoft Store
    needs: build
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      MSSTORE_PRODUCT_ID: 9P534ZMK75XC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9 (MSStore CLI requires it)
        if: secrets.AZURE_AD_TENANT_ID != '' && secrets.AZURE_AD_APPLICATION_CLIENT_ID != '' && secrets.AZURE_AD_APPLICATION_SECRET != '' && secrets.SELLER_ID != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Microsoft Store CLI
        if: secrets.AZURE_AD_TENANT_ID != '' && secrets.AZURE_AD_APPLICATION_CLIENT_ID != '' && secrets.AZURE_AD_APPLICATION_SECRET != '' && secrets.SELLER_ID != ''
        uses: microsoft/microsoft-store-apppublisher@v1.2

      - name: Download MSIX from release
        if: secrets.AZURE_AD_TENANT_ID != '' && secrets.AZURE_AD_APPLICATION_CLIENT_ID != '' && secrets.AZURE_AD_APPLICATION_SECRET != '' && secrets.SELLER_ID != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ inputs.version }}"
          $TAG = "desktop-v$VERSION"
          $msixVersion = "${VERSION}.0"
          $AssetName = "ViharaOS_${msixVersion}_x64.msix"
          New-Item -ItemType Directory -Path release -Force | Out-Null
          gh release download "$TAG" --pattern "$AssetName" --dir release
          if (-not (Test-Path "release/$AssetName")) {
            throw "Could not find MSIX asset $AssetName in release $TAG"
          }
          "MSIX_PATH=release/$AssetName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Reconfigure Microsoft Store credentials
        if: secrets.AZURE_AD_TENANT_ID != '' && secrets.AZURE_AD_APPLICATION_CLIENT_ID != '' && secrets.AZURE_AD_APPLICATION_SECRET != '' && secrets.SELLER_ID != ''
        shell: pwsh
        env:
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZURE_AD_APPLICATION_CLIENT_ID: ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
          AZURE_AD_APPLICATION_SECRET: ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
          SELLER_ID: ${{ secrets.SELLER_ID }}
        run: |
          msstore reconfigure `
            --tenantId $env:AZURE_AD_TENANT_ID `
            --sellerId $env:SELLER_ID `
            --clientId $env:AZURE_AD_APPLICATION_CLIENT_ID `
            --clientSecret $env:AZURE_AD_APPLICATION_SECRET

      - name: Publish MSIX to Microsoft Store
        if: secrets.AZURE_AD_TENANT_ID != '' && secrets.AZURE_AD_APPLICATION_CLIENT_ID != '' && secrets.AZURE_AD_APPLICATION_SECRET != '' && secrets.SELLER_ID != ''
        shell: pwsh
        env:
          MSIX_PATH: ${{ env.MSIX_PATH }}
        run: |
          msstore publish "$env:MSIX_PATH" -id "$env:MSSTORE_PRODUCT_ID"
