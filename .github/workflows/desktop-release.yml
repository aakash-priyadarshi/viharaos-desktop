name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Desktop version (e.g. 0.1.5)'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: macos-15
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-15
            target: x86_64-apple-darwin
            label: macos-x86_64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      # actions/checkout@v5 pinned on 2025-11-13
      # fetch-depth: 0 — full history + tags needed for changelog generation
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      # actions/setup-node@v5 pinned on 2025-09-03
      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24

      # dtolnay/rust-toolchain@stable pinned on 2026-07-05
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        shell: bash
        run: |
          cargo install tauri-cli --version "^2.0.0" --locked || true

      - name: Install GitHub CLI (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install gh -y || true
          echo "C:\\Program Files\\GitHub CLI" >> $GITHUB_PATH

      - name: Validate release version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$INPUT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version '$INPUT_VERSION' — must match ^[0-9]+\.[0-9]+\.[0-9]+$"
            exit 1
          fi
          echo "RELEASE_VERSION=$INPUT_VERSION" >> "$GITHUB_ENV"

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          cd src-tauri
          cargo tauri build --target "$BUILD_TARGET"

      - name: Generate changelog from commits
        id: changelog
        shell: bash
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          TAG="desktop-v${RELEASE_VERSION}"
          # Find the previous desktop release tag (excluding the current one)
          git fetch --tags || true
          PREVIOUS_TAG=$(git tag --list 'desktop-v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous desktop release tag found. Including all commits."
            RANGE="HEAD"
          else
            echo "Generating changelog: ${PREVIOUS_TAG} → ${TAG}"
            RANGE="${PREVIOUS_TAG}..HEAD"
          fi

          # Collect commits grouped by conventional-commit type
          FEATURES=$(git log --pretty=format:'%s' "${RANGE}" 2>/dev/null | grep -iE '^(feat|feature)(\(|:)' | sed 's/^[^:]*: *//' | sed 's/^/- /' || true)
          FIXES=$(git log --pretty=format:'%s' "${RANGE}" 2>/dev/null | grep -iE '^fix(\(|:)' | sed 's/^[^:]*: *//' | sed 's/^/- /' || true)
          REFACTORS=$(git log --pretty=format:'%s' "${RANGE}" 2>/dev/null | grep -iE '^(refactor|perf)(\(|:)' | sed 's/^[^:]*: *//' | sed 's/^/- /' || true)
          CHORES=$(git log --pretty=format:'%s' "${RANGE}" 2>/dev/null | grep -iE '^(chore|ci|build|docs|style|test)(\(|:)' | sed 's/^[^:]*: *//' | sed 's/^/- /' || true)

          # Build the markdown changelog
          {
            if [ -n "$FEATURES" ]; then
              echo "## New Features"
              echo ""
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "## Bug Fixes"
              echo ""
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$REFACTORS" ]; then
              echo "## Improvements"
              echo ""
              echo "$REFACTORS"
              echo ""
            fi
            if [ -n "$CHORES" ]; then
              echo "## Maintenance"
              echo ""
              echo "$CHORES"
              echo ""
            fi

            # If no categorized commits, show a fallback
            if [ -z "$FEATURES" ] && [ -z "$FIXES" ] && [ -z "$REFACTORS" ] && [ -z "$CHORES" ]; then
              echo "No notable changes in this release."
              echo ""
            fi

            echo "---"
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG}"
            else
              echo "Initial desktop release."
            fi
          } > changelog.md

          echo "=== Generated changelog ==="
          cat changelog.md
          echo "=== End changelog ==="

      - name: Create tag and release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          TAG="desktop-v${RELEASE_VERSION}"
          git tag "$TAG" || true
          git push origin "$TAG" || true
          gh release create "$TAG" \
            --title "ViharaOS Desktop v${RELEASE_VERSION}" \
            --notes-file changelog.md \
            --verify-tag || true

      - name: Upload Windows installers and updater artifacts
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          TAG="desktop-v${RELEASE_VERSION}"
          BUILD_DIR="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          find "$BUILD_DIR" -name "*.msi" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "latest.json" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "*.sig" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "*-setup.exe" -exec gh release upload "$TAG" {} --clobber \;

      - name: Upload macOS installers and updater artifacts
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          TAG="desktop-v${RELEASE_VERSION}"
          BUILD_DIR="src-tauri/target/${BUILD_TARGET}/release/bundle"
          # Upload .dmg, .app.tar.gz, latest.json, and .sig files
          find "$BUILD_DIR" -name "*.dmg" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "*.app.tar.gz" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "latest.json" -exec gh release upload "$TAG" {} --clobber \;
          find "$BUILD_DIR" -name "*.sig" -exec gh release upload "$TAG" {} --clobber \;

      - name: Verify release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          TAG="desktop-v${RELEASE_VERSION}"
          echo "Release assets for $TAG:"
          gh release view "$TAG" --json assets --jq '.assets[].name'
