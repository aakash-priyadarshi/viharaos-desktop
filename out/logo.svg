      <stop offset="0.55" stop-color="#F05D00"/>
      <stop offset="1" stop-color="#C74302"/>
    </linearGradient>
    <linearGradient id="vo-leaf" x1="256" y1="96" x2="256" y2="392" gradientUnits="userSpaceOnUse">
