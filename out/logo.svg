    <path d="M256 132 L256 372"/>
    <path d="M256 196 C 226 210, 206 232, 196 262"/>
    <path d="M256 196 C 286 210, 306 232, 316 262"/>
    <path d="M256 252 C 232 264, 216 284, 210 312"/>
    <path d="M256 252 C 280 264, 296 284, 302 312"/>
